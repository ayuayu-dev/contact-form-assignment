services:
  # ==========================
  # PHP（Laravelを動かす）
  # ==========================
  php:
    container_name: contact-form-php

    # DockerfileからPHPイメージを作成
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    # Vite開発サーバーをホストPCへ公開（ブラウザで画面を表示するため）
    ports:
      - "5173:5173"

    # Laravelのソースコードをコンテナと共有
    volumes:
      - ./src:/var/www/html

    # コンテナ内で作業する場所
    working_dir: /var/www/html

  # ==========================
  # Nginx（Webサーバー）
  # ==========================
  nginx:
    container_name: contact-form-nginx

    # 公式イメージを利用
    image: nginx:latest

    # ブラウザから localhost:8080 でアクセスできるようにする
    ports:
      - "8080:80"

    # Laravelのソースコード共有
    volumes:
      - ./src:/var/www/html

      # Nginxの設定ファイル
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    # PHPコンテナが起動してから起動する
    depends_on:
      - php

  # ==========================
  # MySQL
  # ==========================
  mysql:
    container_name: contact-form-mysql

    image: mysql:8.4

    ports:
      - "3306:3306"

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}

    volumes:
      - mysql_data:/var/lib/mysql

# Dockerが管理するデータ領域
volumes:
  mysql_data: