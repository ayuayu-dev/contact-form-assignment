services:
  # ==========================
  # PHP（Laravelを動かす）
  # ==========================
  php:
    container_name: contact-form-php

    # DockerfileからPHPイメージを作成
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    # Vite開発サーバーをホストPCへ公開（ブラウザで画面を表示するため）
    ports:
      - "5173:5173"

    # Laravelのソースコードをコンテナと共有
    volumes:
      - ./src:/var/www/html

    # コンテナ内で作業する場所
    working_dir: /var/www/html

  # ==========================
  # Nginx（Webサーバー）
  # ==========================
  nginx:
    container_name: contact-form-nginx

    # 公式イメージを利用
    image: nginx:latest

    # ブラウザから localhost:8080 でアクセスできるようにする
    ports:
      - "8080:80"

    # Laravelのソースコード共有
    volumes:
      - ./src:/var/www/html

      # Nginxの設定ファイル
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    # PHPコンテナが起動してから起動する
    depends_on:
      - php

  # ==========================
  # MySQL（データベース）
  # ==========================
  mysql:
    container_name: contact-form-mysql

    # 公式イメージを利用
    image: mysql:8.4

    # ホストPCの3306番ポートとコンテナの3306番ポートを接続
    ports:
      - "3306:3306"

    # .envからMySQLの設定を読み込む
    environment:
      # 作成するデータベース名
      MYSQL_DATABASE: ${MYSQL_DATABASE}

      # rootユーザーのパスワード
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

      # Laravelから接続する一般ユーザー名
      MYSQL_USER: ${MYSQL_USER}

      # 一般ユーザーのパスワード
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

      # タイムゾーン
      TZ: ${TZ}

    # MySQLのデータを永続化する
    # コンテナを削除してもデータは残る
    volumes:
      - mysql_data:/var/lib/mysql

  # ==========================
  # Mailpit（メール送信テスト）
  # ==========================
  mailpit:
    container_name: contact-form-mailpit

    # 公式イメージを利用
    image: axllent/mailpit:latest

    # Laravelから送信したメールを受け取り、
    # ブラウザで確認できるようにポートを公開する
    ports:
      # SMTPサーバー
      # Laravelはこのポートへメールを送信する
      - "1025:1025"

      # Mailpitの管理画面
      # ブラウザから http://localhost:8025 で確認できる
      - "8025:8025"

# ==========================
# Dockerが管理するデータ領域
# MySQLのデータを永続化するために使用
# ==========================
volumes:
  mysql_data: